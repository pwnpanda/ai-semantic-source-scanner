xss:
  cwes: [CWE-79]
  codeql_tags: [security/cwe/cwe-079]
  group: injection
  validation_hints:
    - "Render the payload through the same escaping path; assert raw `<script>` survives."
    - "Headless browser sees attacker JS execute (e.g. `document.title` mutated)."
    - "Response body contains the unescaped payload AND the response Content-Type allows execution."

sqli:
  aliases: [sql-injection]
  cwes: [CWE-89]
  codeql_tags: [security/cwe/cwe-089]
  group: injection
  validation_hints:
    - "Force a SQL parser error message in the response (sqlite/mysql/postgres syntax error)."
    - "Extract data not normally accessible (`UNION SELECT`, time-based blind, boolean-based)."
    - "DB log shows attacker-controlled clause that wasn't parameterised."

nosqli:
  aliases: [nosql-injection]
  cwes: [CWE-943]
  codeql_tags: [security/cwe/cwe-943]
  group: injection
  validation_hints:
    - "Operator injection ($where, $regex, $ne) yields a different result set than literal value."
    - "Authentication bypass via `{$ne: null}` or similar operator passthrough."

cmdi:
  aliases: [command-injection, os-cmdi]
  cwes: [CWE-78]
  codeql_tags: [security/cwe/cwe-078]
  group: injection
  validation_hints:
    - "Inject `;`, `&&`, `|`, or `$()` and observe an attacker-chosen command runs (e.g. `id`)."
    - "Process tree shows the spawned binary that wasn't in the original argv."
    - "File side-effect: PoC writes a known marker path; presence proves shell evaluation."

code-injection:
  cwes: [CWE-94]
  codeql_tags: [security/cwe/cwe-094]
  group: injection
  validation_hints:
    - "Attacker-supplied source compiles + executes inside the interpreter (eval/Function/exec)."
    - "Side-effect: import a stdlib module the original code never used."

ssti:
  aliases: [template-injection]
  cwes: [CWE-1336]
  codeql_tags: [security/cwe/cwe-1336]
  group: injection
  validation_hints:
    - "Template syntax (`{{7*7}}`) renders the computed value `49` in the response."
    - "Engine-specific escape (`{% debug %}`, `${T(java.lang.Runtime)...}`) yields execution markers."

prompt-injection:
  cwes: [CWE-1427]
  codeql_tags: []
  group: injection
  needs_semantic: true

xxe:
  aliases: [xml-external-entity]
  cwes: [CWE-611]
  codeql_tags: [security/cwe/cwe-611]
  group: injection

ldap-injection:
  cwes: [CWE-90]
  codeql_tags: [security/cwe/cwe-090]
  group: injection

crlf-injection:
  aliases: [header-injection]
  cwes: [CWE-93]
  codeql_tags: [security/cwe/cwe-093]
  group: injection

path-traversal:
  aliases: [dir-traversal]
  cwes: [CWE-22]
  codeql_tags: [security/cwe/cwe-022]
  group: file
  validation_hints:
    - "Read a file outside the documented allow-root (`/etc/hostname`, `/etc/passwd`)."
    - "Encoded traversal (`%2e%2e%2f`, NUL-byte) bypasses the filter."

lfi:
  aliases: [local-file-inclusion]
  cwes: [CWE-98]
  codeql_tags: [security/cwe/cwe-098]
  group: file
  validation_hints:
    - "Include and execute a local file the application doesn't normally load (e.g. log file with PHP)."
    - "PHP wrappers (`php://filter/convert.base64-encode/resource=`) leak source code."

rfi:
  aliases: [remote-file-inclusion]
  cwes: [CWE-98]
  codeql_tags: [security/cwe/cwe-098]
  group: file
  validation_hints:
    - "Include from attacker-controlled host (network usually disabled in sandbox; file:// scheme is the offline analogue)."

ssrf:
  cwes: [CWE-918]
  codeql_tags: [security/cwe/cwe-918]
  group: request-forgery
  validation_hints:
    - "Out-of-band callback received on attacker-controlled DNS/HTTP beacon (interactsh)."
    - "Response leaks content from a private IP (cloud metadata, internal service)."

csrf:
  cwes: [CWE-352]
  codeql_tags: [security/cwe/cwe-352]
  group: request-forgery
  validation_hints:
    - "Cross-origin form/JSON POST with no anti-CSRF token succeeds in mutating state."
    - "Server's response indicates the action ran despite the missing/forged CSRF token."

idor:
  aliases: [bola]
  cwes: [CWE-639]
  codeql_tags: []
  group: authz
  needs_semantic: true
  validation_hints:
    - "Two distinct user accounts: user A authenticates, requests user B's resource by id, gets it."
    - "Server returns the foreign resource (200 with body) instead of 403/404."

bfla:
  cwes: [CWE-862]
  codeql_tags: []
  group: authz
  needs_semantic: true

mass-assignment:
  cwes: [CWE-915]
  codeql_tags: [security/cwe/cwe-915]
  group: authz

open-redirect:
  cwes: [CWE-601]
  codeql_tags: [security/cwe/cwe-601]
  group: redirect

cors-misconfig:
  cwes: [CWE-942]
  codeql_tags: [security/cwe/cwe-942]
  group: web-config

unsafe-deserialization:
  aliases: [insec-deser]
  cwes: [CWE-502]
  codeql_tags: [security/cwe/cwe-502]
  group: serialization

prototype-pollution:
  cwes: [CWE-1321]
  codeql_tags: [security/cwe/cwe-1321]
  group: javascript

dom-clobbering:
  cwes: [CWE-79]
  codeql_tags: []
  group: javascript
  needs_semantic: true

redos:
  aliases: [regex-dos]
  cwes: [CWE-1333]
  codeql_tags: [security/cwe/cwe-1333]
  group: dos

auth-bypass:
  aliases: [broken-authn]
  cwes: [CWE-287]
  codeql_tags: [security/cwe/cwe-287]
  group: authn

weak-crypto:
  cwes: [CWE-327, CWE-328]
  codeql_tags: [security/cwe/cwe-327, security/cwe/cwe-328]
  group: crypto

insecure-random:
  cwes: [CWE-330, CWE-338]
  codeql_tags: [security/cwe/cwe-338]
  group: crypto

jwt-misuse:
  cwes: [CWE-345, CWE-347]
  codeql_tags: [security/cwe/cwe-347]
  group: authn

session-fixation:
  cwes: [CWE-384]
  codeql_tags: [security/cwe/cwe-384]
  group: session

host-header-injection:
  cwes: [CWE-20]
  codeql_tags: []
  group: web-config
  needs_semantic: true

request-smuggling:
  cwes: [CWE-444]
  codeql_tags: []
  group: web-config
  needs_semantic: true

cache-poisoning:
  cwes: [CWE-444]
  codeql_tags: []
  group: web-config
  needs_semantic: true

oauth-misconfig:
  cwes: [CWE-285]
  codeql_tags: []
  group: web-config
  needs_semantic: true

info-disclosure:
  cwes: [CWE-200]
  codeql_tags: [security/cwe/cwe-200]
  group: data-exposure

client-side-redirect:
  cwes: [CWE-601]
  codeql_tags: []
  group: redirect
  needs_semantic: true

groups:
  injection:
    [xss, sqli, nosqli, cmdi, code-injection, ssti, prompt-injection, xxe, ldap-injection, crlf-injection]
  file: [path-traversal, lfi, rfi]
  authz: [idor, bfla, mass-assignment]
  authn: [auth-bypass, jwt-misuse]
  request-forgery: [ssrf, csrf]
  crypto: [weak-crypto, insecure-random]
  web-config: [cors-misconfig, host-header-injection, request-smuggling, cache-poisoning, oauth-misconfig]
  serialization: [unsafe-deserialization]
  javascript: [prototype-pollution, dom-clobbering]
  redirect: [open-redirect, client-side-redirect]
  dos: [redos]
  data-exposure: [info-disclosure]
  session: [session-fixation]
  all-injection: ["@injection", "@file", "@serialization"]
