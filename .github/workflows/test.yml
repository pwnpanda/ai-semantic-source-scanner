name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-types-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install Python project + dev deps
        run: uv sync --all-groups

      # The Node AST worker (ai_codescan/ast/node_worker) ships
      # tree-sitter + per-language grammars as a pnpm workspace. The
      # prep / smoke tests spawn ``node worker.mjs``, which fails to
      # resolve ``tree-sitter`` if these aren't installed.
      - name: Set up pnpm
        uses: pnpm/action-setup@5d445ecbfcb90fdf1556a629d018c79e97ff973b  # v6.0.6
        with:
          version: 10
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ai_codescan/ast/node_worker/pnpm-lock.yaml

      - name: Install Node AST worker deps
        working-directory: ai_codescan/ast/node_worker
        run: pnpm install --frozen-lockfile

      - name: Lint (ruff check)
        run: uv run ruff check ai_codescan/ tests/

      - name: Format check (ruff format)
        run: uv run ruff format --check ai_codescan/ tests/

      - name: Types (ty)
        run: uv run ty check ai_codescan/

      - name: Tests (unit only; integration suites skipped in CI)
        run: uv run pytest tests/ -m "not integration" --cov=ai_codescan --cov-report=term --cov-fail-under=75
