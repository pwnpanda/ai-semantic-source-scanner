name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-types-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install project and dev deps
        run: uv sync --all-groups

      - name: Lint (ruff check)
        run: uv run ruff check ai_codescan/ tests/

      - name: Format check (ruff format)
        run: uv run ruff format --check ai_codescan/ tests/

      - name: Types (ty)
        run: uv run ty check ai_codescan/

      - name: Tests (unit only; integration suites skipped in CI)
        run: uv run pytest tests/ -m "not integration" --cov=ai_codescan --cov-report=term --cov-fail-under=75
